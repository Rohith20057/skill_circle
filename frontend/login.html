<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Skill Circle</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="title">Skill Circle</div>

      <!-- LOGIN FORM -->
      <div id="loginForm" class="form">
        <h2>Login</h2>

        <div class="input-box">
          <input type="email" id="loginEmail" placeholder="Enter Email" />
        </div>

        <div class="input-box">
          <input
            type="password"
            id="loginPassword"
            placeholder="Enter Password"
          />
          <span class="eye" onclick="togglePassword('loginPassword')">👁</span>
        </div>

        <button class="btn login-btn" onclick="login()">Login</button>

        <div class="switch" onclick="showSignup()">
          Don't have account? Sign Up
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" class="form" style="display: none">
        <h2>Sign Up</h2>

        <div class="input-box">
          <input type="text" id="name" placeholder="Full Name" />
        </div>

        <div class="input-box">
          <input type="email" id="email" placeholder="Email" />
        </div>

        <div class="input-box">
          <input type="password" id="password" placeholder="Password" />
          <span class="eye" onclick="togglePassword('password')">👁</span>
        </div>

        <button class="btn login-btn" onclick="signup()">Create Account</button>

        <div class="switch" onclick="showLogin()">
          Already have account? Login
        </div>
      </div>
    </div>

    <!-- Link JS -->
    <script src="script.js"></script>
  </body>
</html>
