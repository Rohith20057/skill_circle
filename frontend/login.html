<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | SkillCircle</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-body">

    <div class="auth-card">
        <h2>Login to SkillCircle</h2>
        <p class="sub-text">Learn & share skills with confidence</p>
        <!-- action="../backend/auth/login.php" method="POST" -->
        <form onsubmit="handleLogin(event)">
            <input type="email" id="email" name="email" placeholder="Email address" required>
            <input type="password" id="password" name="password" placeholder="Password" required>

            <button type="submit" class="btn-primary">Login</button>
        </form>

        <p class="switch-text" style="text-align: center; margin-top: 15px;">
            Don’t have an account?
            <a href="register.html" style="color: #fff; text-decoration: underline;">Sign up</a>
        </p>
    </div>
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("http://127.0.0.1:8000/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Login successful! Welcome " + data.user.fullname);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    window.location.href = "home.html";
                } else {
                    alert("Error: " + data.detail);
                }
            } catch (error) {
                console.error("Error connecting to server:", error);
                alert("Cannot connect to backend server.");
            }
        }
    </script>
</body>

</html>
